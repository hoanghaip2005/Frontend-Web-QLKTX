name: Web Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-deploy-production
  cancel-in-progress: false

env:
  VITE_API_MODE: live
  VITE_API_URL: ${{ vars.VITE_API_URL || 'https://qlktx-backend-2302700155.azurewebsites.net' }}
  AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

jobs:
  build:
    name: Build production bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

  deploy-azure-static-web-apps:
    name: Deploy Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        if: env.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          output_location: dist
          app_build_command: npm run build
        env:
          VITE_API_MODE: ${{ env.VITE_API_MODE }}
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Deployment skipped
        if: env.AZURE_STATIC_WEB_APPS_API_TOKEN == ''
        run: |
          echo "AZURE_STATIC_WEB_APPS_API_TOKEN is not configured."
          echo "Create an Azure Static Web App, then add its deployment token as a GitHub Actions secret."
