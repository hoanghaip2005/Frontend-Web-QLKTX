name: Web Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-deploy-production
  cancel-in-progress: false

env:
  VITE_API_MODE: live
  VITE_API_URL: ${{ vars.VITE_API_URL || 'https://qlktx-backend-2302700155.azurewebsites.net' }}
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || 'qlktx-web-2302700155' }}
  AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

jobs:
  build:
    name: Build production bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

  deploy-azure-web-app:
    name: Deploy Azure App Service
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Deploy
        if: env.AZURE_WEBAPP_PUBLISH_PROFILE != ''
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: dist

      - name: Deployment skipped
        if: env.AZURE_WEBAPP_PUBLISH_PROFILE == ''
        run: |
          echo "AZURE_WEBAPP_PUBLISH_PROFILE is not configured."
          echo "Download the publish profile from Azure App Service and add it as a GitHub Actions secret."
